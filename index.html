<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Card Perks">
<meta name="theme-color" content="#1a1a1a">
<title>Card Perks Tracker</title>
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg: #F7F4EF;
    --surface: #FFFFFF;
    --surface-2: #F0EDE8;
    --border: #E2DDD6;
    --text: #1C1917;
    --text-secondary: #78716C;
    --text-muted: #A8A29E;
    --accent: #2D6A4F;
    --accent-light: #E8F4EE;
    --accent-text: #1B4332;
    --gold: #92400E;
    --gold-light: #FEF3C7;
    --warn: #9A3412;
    --warn-light: #FEE2E2;
    --purple: #4C1D95;
    --purple-light: #EDE9FE;
    --blue: #1E3A5F;
    --blue-light: #DBEAFE;
    --radius: 14px;
    --radius-sm: 8px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: calc(80px + var(--safe-bottom));
  }

  .app-header {
    background: var(--text);
    color: white;
    padding: calc(var(--safe-top) + 16px) 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .app-title { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .app-subtitle { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 1px; letter-spacing: 0.02em; text-transform: uppercase; }
  .header-stats { text-align: right; }
  .stat-pill { font-size: 13px; font-weight: 600; color: #86EFAC; }
  .stat-pill span { color: rgba(255,255,255,0.5); font-weight: 400; }
  .progress-wrap { margin-top: 12px; }
  .progress-bar { height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: #86EFAC; border-radius: 2px; transition: width 0.4s ease; }
  .progress-label { display: flex; justify-content: space-between; margin-top: 5px; font-size: 11px; color: rgba(255,255,255,0.45); }

  .filter-bar {
    display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto;
    background: var(--surface); border-bottom: 1px solid var(--border);
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip {
    flex-shrink: 0; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500;
    border: 1.5px solid var(--border); background: transparent; color: var(--text-secondary);
    cursor: pointer; transition: all 0.15s;
  }
  .filter-chip.active { background: var(--text); color: white; border-color: var(--text); }

  .summary-row {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    padding: 14px 16px 0;
  }
  .summary-card {
    background: var(--surface); border-radius: var(--radius-sm);
    padding: 12px 10px; text-align: center; border: 1px solid var(--border);
  }
  .summary-val { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .summary-val.green { color: var(--accent); }
  .summary-lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; line-height: 1.3; }

  .section-wrap { padding: 0 16px; margin-top: 20px; }
  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text-muted);
    padding: 0 0 8px; display: flex; align-items: center; gap: 6px;
  }
  .section-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot-monthly { background: var(--warn); }
  .dot-semi { background: var(--accent); }
  .dot-annual { background: var(--blue); }
  .dot-4yr { background: var(--purple); }

  .card-block {
    background: var(--surface); border-radius: var(--radius);
    border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden;
  }
  .card-head {
    padding: 12px 14px; background: var(--surface-2);
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
  }
  .card-name { font-size: 14px; font-weight: 600; line-height: 1.3; }
  .card-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; align-items: center; }
  .badge {
    font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px;
    letter-spacing: 0.02em; text-transform: uppercase; white-space: nowrap;
  }
  .badge-business { background: var(--purple-light); color: var(--purple); }
  .badge-personal { background: var(--accent-light); color: var(--accent-text); }
  .badge-fee { background: var(--gold-light); color: var(--gold); }
  .badge-free { background: var(--accent-light); color: var(--accent-text); }
  .badge-anniv { background: var(--surface); color: var(--text-secondary); border: 1px solid var(--border); }
  .card-progress { text-align: right; flex-shrink: 0; }
  .card-prog-text { font-size: 12px; color: var(--text-muted); }
  .card-prog-bar { width: 48px; height: 3px; background: var(--border); border-radius: 2px; margin-top: 4px; overflow: hidden; }
  .card-prog-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

  /* Perk group (one benefit with sub-checkboxes) */
  .perk-group { border-bottom: 1px solid var(--border); }
  .perk-group:last-child { border-bottom: none; }
  .perk-group-header {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 11px 14px 8px; 
  }
  .perk-group-info { flex: 1; min-width: 0; }
  .perk-name { font-size: 13px; font-weight: 500; line-height: 1.35; }
  .perk-note { font-size: 11px; color: var(--text-muted); margin-top: 2px; line-height: 1.4; }
  .perk-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .perk-value { font-size: 13px; font-weight: 700; color: var(--accent); white-space: nowrap; }
  .freq-tag {
    font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px;
    white-space: nowrap; letter-spacing: 0.02em;
  }
  .freq-monthly { background: var(--warn-light); color: var(--warn); }
  .freq-annual { background: var(--blue-light); color: var(--blue); }
  .freq-semi { background: var(--accent-light); color: var(--accent-text); }
  .freq-4yr { background: var(--purple-light); color: var(--purple); }

  /* Sub-checkbox grid */
  .sub-checks {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 0 14px 11px 40px;
  }
  .sub-check {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 10px; border-radius: 20px; border: 1.5px solid var(--border);
    background: var(--surface-2); cursor: pointer; transition: all 0.12s;
    font-size: 12px; font-weight: 500; color: var(--text-secondary);
    user-select: none;
  }
  .sub-check:active { opacity: 0.7; }
  .sub-check.done {
    background: var(--accent-light); border-color: var(--accent);
    color: var(--accent-text);
  }
  .sub-check-dot {
    width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    background: white;
  }
  .sub-check.done .sub-check-dot {
    background: var(--accent); border-color: var(--accent);
  }
  .sub-check.done .sub-check-dot::after {
    content: ''; display: block; width: 4px; height: 6px;
    border: 1.5px solid white; border-top: none; border-left: none;
    transform: rotate(45deg) translate(-0.5px, -0.5px);
  }

  /* Single checkbox row (for annual / every 4 yr) */
  .perk-row {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 11px 14px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.1s; user-select: none;
  }
  .perk-row:last-child { border-bottom: none; }
  .perk-row:active { background: var(--surface-2); }
  .perk-row.checked { opacity: 0.5; }
  .check-circle {
    width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: all 0.15s; margin-top: 1px; background: white;
  }
  .check-circle.done { background: var(--accent); border-color: var(--accent); }
  .check-circle.done::after {
    content: ''; display: block; width: 6px; height: 10px;
    border: 2px solid white; border-top: none; border-left: none;
    transform: rotate(45deg) translate(-1px, -1px);
  }
  .perk-info { flex: 1; min-width: 0; }

  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; padding: 10px 0 calc(10px + var(--safe-bottom));
    z-index: 100;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    font-size: 10px; font-weight: 500; color: var(--text-muted);
    border: none; background: transparent; cursor: pointer; padding: 4px 0;
    letter-spacing: 0.02em;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 20px; line-height: 1; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: flex-end; z-index: 200;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal-sheet {
    background: var(--surface); border-radius: 20px 20px 0 0;
    padding: 20px 20px calc(20px + var(--safe-bottom));
    width: 100%; transform: translateY(100%); transition: transform 0.3s ease;
  }
  .modal-overlay.open .modal-sheet { transform: translateY(0); }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
  .modal-body { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.5; }
  .modal-btn {
    width: 100%; padding: 14px; border-radius: var(--radius-sm);
    font-size: 16px; font-weight: 600; border: none; cursor: pointer; margin-bottom: 10px;
  }
  .modal-btn-danger { background: #DC2626; color: white; }
  .modal-btn-cancel { background: var(--surface-2); color: var(--text); }
  .empty { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-top">
    <div>
      <div class="app-title">Card Perks</div>
      <div class="app-subtitle">Benefits Tracker</div>
    </div>
    <div class="header-stats">
      <div class="stat-pill" id="hdr-redeemed">$0 <span>redeemed</span></div>
      <div class="stat-pill" id="hdr-fees" style="margin-top:2px;color:rgba(255,255,255,0.5);font-size:12px;font-weight:400;"></div>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="progress-label"><span id="prog-left">0 credits used</span><span id="prog-pct">0%</span></div>
  </div>
</header>

<div class="filter-bar" id="filter-bar">
  <button class="filter-chip active" data-filter="all">All</button>
  <button class="filter-chip" data-filter="monthly">Monthly</button>
  <button class="filter-chip" data-filter="semi-annual">Semi-annual</button>
  <button class="filter-chip" data-filter="annual">Annual</button>
  <button class="filter-chip" data-filter="every 4 years">Every 4 yrs</button>
  <button class="filter-chip" data-filter="business">Business</button>
  <button class="filter-chip" data-filter="personal">Personal</button>
</div>

<div class="summary-row" id="summary-row"></div>
<div id="main-content" style="padding-bottom:8px;"></div>

<nav class="bottom-nav">
  <button class="nav-btn active" data-tab="all" onclick="setTab('all')">
    <span class="nav-icon">💳</span>All Cards
  </button>
  <button class="nav-btn" data-tab="business" onclick="setTab('business')">
    <span class="nav-icon">🏢</span>Business
  </button>
  <button class="nav-btn" data-tab="personal" onclick="setTab('personal')">
    <span class="nav-icon">👤</span>Personal
  </button>
  <button class="nav-btn" onclick="openReset()">
    <span class="nav-icon">↺</span>Reset
  </button>
</nav>

<div class="modal-overlay" id="reset-modal">
  <div class="modal-sheet">
    <div class="modal-title">Reset all checks?</div>
    <div class="modal-body">This will uncheck every benefit across all cards. You'll start fresh for the new year.</div>
    <button class="modal-btn modal-btn-danger" onclick="confirmReset()">Yes, reset everything</button>
    <button class="modal-btn modal-btn-cancel" onclick="closeReset()">Cancel</button>
  </div>
</div>

<script>
const SK = 'cc-perks-app-v2';
let checked = {};
try { checked = JSON.parse(localStorage.getItem(SK) || '{}'); } catch(e) {}

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const QUARTERS = ['Q1 Jan–Mar','Q2 Apr–Jun','Q3 Jul–Sep','Q4 Oct–Dec'];
const HALVES = ['Jan–Jun','Jul–Dec'];

// Each perk has a `slots` array — each slot is a separate checkbox
// slot: { id, label }
function makeSlots(baseId, freq) {
  if (freq === 'monthly') return MONTHS.map((m,i) => ({ id: baseId+'_'+i, label: m }));
  if (freq === 'quarterly') return QUARTERS.map((q,i) => ({ id: baseId+'_q'+i, label: q }));
  if (freq === 'semi-annual') return HALVES.map((h,i) => ({ id: baseId+'_h'+i, label: h }));
  return [{ id: baseId, label: null }]; // single checkbox
}

    { id:'d2', name:'2% back on top 3 non-Amazon categories', value:0, freq:'annual', note:'Auto-calculated each statement cycle on first $150K/yr' },
  ]},
  { id:'frederick_vxb', name:'Frederick Venture X Business', type:'business', fee:395, anniversary:'June 5', perks:[

    { id:'e4', name:'Priority Pass + Capital One lounge access', value:0, freq:'annual', note:'Unlimited access for primary cardholder' },
  ]},
  { id:'loudoun_ink', name:'Loudoun Chase Business Ink', type:'business', fee:95, anniversary:null, perks:[

    { id:'k2', name:'$120 Uber Cash — $10/mo', value:120, freq:'monthly', note:'$10/month added to Uber account. Add Gold Card to Uber app first.' },
    { id:'k3', name:"$84 Dunkin' credit — $7/mo", value:84, freq:'monthly', note:"Up to $7/month at U.S. Dunkin' locations. Enrollment required." },

    { id:'n2', name:'10% flight discount promo code', value:0, freq:'annual', note:'One promo code/year for 10% off any Southwest flight (excludes Basic fare)' },
    { id:'n3', name:'Free first checked bag', value:0, freq:'annual', note:'You + up to 8 passengers on same reservation' },
    { id:'n4', name:'10,000 Companion Pass qualifying points boost', value:0, freq:'annual', note:'Calendar-year boost toward 135,000-point Companion Pass threshold' },
  ]},
  { id:'hilton', name:'Hilton Honors Amex Surpass', type:'personal', fee:150, anniversary:null, perks:[
    { id:'o1', name:'$200 Hilton property credit — $50/quarter', value:200, freq:'quarterly', note:'Use at any Hilton — dining, spa, parking, etc. Does not roll over quarter to quarter.' },
    { id:'o2', name:'Complimentary Hilton Gold status', value:0, freq:'annual', note:'Automatic with card. Includes 80% bonus points, continental breakfast at select brands, room upgrades.' },
    { id:'o3', name:'Free Night Reward (after $15K spend)', value:0, freq:'annual', note:'1 free standard night if you spend $15,000 in a calendar year' },
    { id:'o4', name:'National Car Rental Emerald Club Executive status', value:0, freq:'annual', note:'Enroll through Amex online account. Executive Area access + upgrades.' },
  ]},
];

// Build cards with slots
const cards = rawCards.map(c => ({
  ...c,
  perks: c.perks.map(p => ({
    ...p,
    slots: makeSlots(p.id, p.freq),
    displayFreq: p.freq === 'quarterly' ? 'semi-annual' : p.freq // for section grouping
  }))
}));

const freqClass = { monthly:'freq-monthly', annual:'freq-annual', 'semi-annual':'freq-semi', 'every 4 years':'freq-4yr', quarterly:'freq-semi' };
const freqLabel = { monthly:'Monthly', annual:'Annual', 'semi-annual':'Semi-annual', 'every 4 years':'Every 4 yrs', quarterly:'Quarterly' };

const sections = [
  { key:'monthly', label:'Monthly — use every month', dotClass:'dot-monthly' },
  { key:'semi-annual', label:'Semi-annual & Quarterly', dotClass:'dot-semi' },
  { key:'annual', label:'Annual — once per card year', dotClass:'dot-annual' },
  { key:'every 4 years', label:'Every 4 years — set a reminder', dotClass:'dot-4yr' },
];

let activeFilter = 'all';
let activeTab = 'all';

function save() { try { localStorage.setItem(SK, JSON.stringify(checked)); } catch(e) {} }
function toggleSlot(id) { checked[id] = !checked[id]; save(); render(); }
function openReset() { document.getElementById('reset-modal').classList.add('open'); }
function closeReset() { document.getElementById('reset-modal').classList.remove('open'); }
function confirmReset() { checked = {}; save(); closeReset(); render(); }
function setTab(t) {
  activeTab = t; activeFilter = 'all';
  document.querySelectorAll('.nav-btn[data-tab]').forEach(b => b.classList.toggle('active', b.dataset.tab === t));
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.filter === 'all'));
  render();
}

document.getElementById('filter-bar').addEventListener('click', e => {
  const chip = e.target.closest('.filter-chip');
  if (!chip) return;
  activeFilter = chip.dataset.filter;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c === chip));
  render();
});

document.getElementById('reset-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('reset-modal')) closeReset();
});

function getFiltered() {
  const typeFilter = activeTab !== 'all' ? activeTab : (['business','personal'].includes(activeFilter) ? activeFilter : 'all');
  const freqFilter = (!['business','personal','all'].includes(activeFilter)) ? activeFilter : 'all';
  return cards.map(c => ({
    ...c,
    perks: c.perks.filter(p => {
      if (freqFilter === 'all') return true;
      if (freqFilter === 'semi-annual') return p.freq === 'semi-annual' || p.freq === 'quarterly';
      return p.freq === freqFilter;
    })
  })).filter(c => (typeFilter === 'all' || c.type === typeFilter) && c.perks.length > 0);
}

function render() {
  const fc = getFiltered();

  // Compute totals across all slots
  let totalValue = 0, checkedValue = 0, totalSlots = 0, checkedSlots = 0;
  fc.forEach(c => c.perks.forEach(p => {
    const slotVal = p.slots.length > 0 && p.value ? p.value / p.slots.length : 0;
    p.slots.forEach(s => {
      if (p.value) { totalValue += slotVal; totalSlots++; }
      if (checked[s.id]) { if (p.value) { checkedValue += slotVal; checkedSlots++; } }
    });
  }));
  // Round for display
  checkedValue = Math.round(checkedValue);
  totalValue = Math.round(totalValue);

  const totalFees = cards.reduce((a, c) => a + (c.fee || 0), 0);
  const pct = totalValue ? Math.round(checkedValue / totalValue * 100) : 0;

  document.getElementById('hdr-redeemed').innerHTML = `$${checkedValue.toLocaleString()} <span>redeemed</span>`;
  document.getElementById('hdr-fees').textContent = `$${totalFees.toLocaleString()} total annual fees`;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-left').textContent = `$${checkedValue.toLocaleString()} of $${totalValue.toLocaleString()} used`;
  document.getElementById('prog-pct').textContent = pct + '%';

  document.getElementById('summary-row').innerHTML = `
    <div class="summary-card"><div class="summary-val">$${totalFees.toLocaleString()}</div><div class="summary-lbl">Annual fees</div></div>
    <div class="summary-card"><div class="summary-val">$${totalValue.toLocaleString()}</div><div class="summary-lbl">Trackable credits</div></div>
    <div class="summary-card"><div class="summary-val green">$${checkedValue.toLocaleString()}</div><div class="summary-lbl">Credits used</div></div>
  `;

  // Group by section
  const grouped = {};
  sections.forEach(s => { grouped[s.key] = []; });
  fc.forEach(card => {
    const bySection = {};
    card.perks.forEach(p => {
      const key = p.displayFreq === 'quarterly' ? 'semi-annual' : p.displayFreq;
      if (!bySection[key]) bySection[key] = [];
      bySection[key].push(p);
    });
    Object.entries(bySection).forEach(([key, perks]) => {
      if (grouped[key]) grouped[key].push({ card, perks });
    });
  });

  let html = '';
  sections.forEach(({ key, label, dotClass }) => {
    const items = grouped[key];
    if (!items || !items.length) return;
    html += `<div class="section-wrap">
      <div class="section-label"><span class="section-dot ${dotClass}"></span>${label}</div>`;

    items.forEach(({ card, perks }) => {
      // Count all slots for this card's filtered perks
      const allSlots = perks.flatMap(p => p.slots);
      const doneSlots = allSlots.filter(s => checked[s.id]).length;
      const perkPct = allSlots.length ? Math.round(doneSlots / allSlots.length * 100) : 0;

      const feeTag = card.fee === 0
        ? `<span class="badge badge-free">No annual fee</span>`
        : `<span class="badge badge-fee">$${card.fee}/yr</span>`;
      const anniversaryTag = card.anniversary
        ? `<span class="badge badge-anniv">📅 ${card.anniversary}</span>` : '';

      html += `<div class="card-block">
        <div class="card-head">
          <div>
            <div class="card-name">${card.name}</div>
            <div class="card-meta">
              <span class="badge badge-${card.type}">${card.type}</span>
              ${feeTag}${anniversaryTag}
            </div>
          </div>
          <div class="card-progress">
            <div class="card-prog-text">${doneSlots}/${allSlots.length}</div>
            <div class="card-prog-bar"><div class="card-prog-fill" style="width:${perkPct}%"></div></div>
          </div>
        </div>`;

      perks.forEach(p => {
        const isSingle = p.slots.length === 1;
        const slotsDone = p.slots.filter(s => checked[s.id]).length;

        if (isSingle) {
          // Single checkbox row
          const slot = p.slots[0];
          html += `<div class="perk-row ${checked[slot.id] ? 'checked' : ''}" onclick="toggleSlot('${slot.id}')">
            <div class="check-circle ${checked[slot.id] ? 'done' : ''}"></div>
            <div class="perk-info">
              <div class="perk-name">${p.name}</div>
              ${p.note ? `<div class="perk-note">${p.note}</div>` : ''}
            </div>
            <div class="perk-right">
              ${p.value ? `<div class="perk-value">+$${p.value}</div>` : '<div class="perk-value" style="color:var(--text-muted);font-size:11px">perk</div>'}
              <span class="freq-tag ${freqClass[p.freq]}">${freqLabel[p.freq]}</span>
            </div>
          </div>`;
        } else {
          // Multi-checkbox group
          const slotVal = p.value ? Math.round(p.value / p.slots.length) : 0;
          html += `<div class="perk-group">
            <div class="perk-group-header">
              <div class="perk-group-info">
                <div class="perk-name">${p.name}</div>
                ${p.note ? `<div class="perk-note">${p.note}</div>` : ''}
              </div>
              <div class="perk-right">
                ${p.value ? `<div class="perk-value">${slotsDone}/${p.slots.length} used</div>` : ''}
                <span class="freq-tag ${freqClass[p.freq]}">${freqLabel[p.freq]}</span>
              </div>
            </div>
            <div class="sub-checks">
              ${p.slots.map(s => `
                <div class="sub-check ${checked[s.id] ? 'done' : ''}" onclick="toggleSlot('${s.id}')">
                  <div class="sub-check-dot"></div>
                  <span>${s.label}${slotVal ? ` +$${slotVal}` : ''}</span>
                </div>`).join('')}
            </div>
          </div>`;
        }
      });

      html += `</div>`; // card-block
    });
    html += '</div>'; // section-wrap
  });

  if (!html) html = '<div class="empty">No cards match this filter.</div>';
  document.getElementById('main-content').innerHTML = html;
}

render();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
